name: Deploy Spring Boot to cPanel (FTP)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  SERVER_DIR: './server'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # ==========================================
    # 1. CHECKOUT CODE
    # ==========================================
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    # ==========================================
    # 2. SETUP JAVA
    # ==========================================
    - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    # ==========================================
    # 3. VALIDATE PROJECT
    # ==========================================
    - name: 🔍 Validate Maven Project
      working-directory: ${{ env.SERVER_DIR }}
      run: |
        if [ ! -f "pom.xml" ]; then
          echo "❌ pom.xml not found"
          exit 1
        fi
        echo "✅ pom.xml found"

    # ==========================================
    # 4. BUILD SPRING BOOT
    # ==========================================
    - name: 🔨 Build Spring Boot Application
      working-directory: ${{ env.SERVER_DIR }}
      run: |
        echo "=========================================="
        echo "Building Spring Boot Application..."
        echo "=========================================="
        mvn clean package -DskipTests -B
        
        echo ""
        echo "✅ Build completed successfully!"
        echo ""
        echo "JAR files:"
        ls -lh target/*.jar
        echo ""

    # ==========================================
    # 5. GET JAR INFO
    # ==========================================
    - name: 📦 Get JAR File Information
      id: jar-info
      working-directory: ${{ env.SERVER_DIR }}
      run: |
        JAR_FILE=$(find target -name "*.jar" -not -name "*-original.jar" | head -1)
        JAR_NAME=$(basename "$JAR_FILE")
        JAR_SIZE=$(du -h "$JAR_FILE" | cut -f1)
        
        echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
        echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
        echo "jar_size=$JAR_SIZE" >> $GITHUB_OUTPUT
        
        echo "=========================================="
        echo "JAR Information:"
        echo "File: $JAR_NAME"
        echo "Size: $JAR_SIZE"
        echo "=========================================="

    # ==========================================
    # 6. PREPARE DEPLOYMENT FILES
    # ==========================================
    - name: 📝 Create Deployment Scripts
      run: |
        # Tạo thư mục deploy
        mkdir -p deploy/lvtn-app
        mkdir -p deploy/lvtn-app/logs
        mkdir -p deploy/lvtn-app/backups
        
        # Copy JAR file
        cp ${{ env.SERVER_DIR }}/target/*.jar deploy/lvtn-app/ 2>/dev/null || true
        
        # Tạo script start
        cat > deploy/lvtn-app/start.sh << 'EOF'
        #!/bin/bash
        
        cd ~/lvtn-app
        
        echo "=========================================="
        echo "Starting LVTN Application"
        echo "=========================================="
        
        # Stop old process
        echo "Stopping old application..."
        pkill -f "\.jar" || true
        sleep 3
        
        # Find JAR file
        JAR_FILE=$(ls -t *.jar 2>/dev/null | grep -v backup | head -1)
        
        if [ -z "$JAR_FILE" ]; then
          echo "❌ No JAR file found!"
          exit 1
        fi
        
        echo "JAR File: $JAR_FILE"
        
        # Backup if exists
        if [ -f "current.jar" ]; then
          BACKUP="backups/backup_$(date +%Y%m%d_%H%M%S).jar"
          cp current.jar "$BACKUP"
          echo "Backup saved: $BACKUP"
          
          # Keep only last 5 backups
          ls -t backups/*.jar 2>/dev/null | tail -n +6 | xargs rm -f || true
        fi
        
        # Create symlink
        ln -sf "$JAR_FILE" current.jar
        
        # Start application
        echo "Starting application..."
        nohup java -Xms512m -Xmx1024m \
          -Dspring.profiles.active=prod \
          -Dserver.port=8080 \
          -jar current.jar \
          > logs/app.log 2>&1 &
        
        PID=$!
        echo $PID > app.pid
        
        echo ""
        echo "=========================================="
        echo "✅ Application Started!"
        echo "=========================================="
        echo "PID: $PID"
        echo "Log: ~/lvtn-app/logs/app.log"
        echo ""
        echo "Check status: ps aux | grep java"
        echo "View logs: tail -f ~/lvtn-app/logs/app.log"
        echo "=========================================="
        EOF
        
        chmod +x deploy/lvtn-app/start.sh
        
        # Tạo script stop
        cat > deploy/lvtn-app/stop.sh << 'EOF'
        #!/bin/bash
        
        echo "Stopping application..."
        pkill -f "\.jar" || true
        
        if [ -f ~/lvtn-app/app.pid ]; then
          PID=$(cat ~/lvtn-app/app.pid)
          if ps -p $PID > /dev/null 2>&1; then
            kill -15 $PID || true
            sleep 3
            if ps -p $PID > /dev/null 2>&1; then
              kill -9 $PID || true
            fi
          fi
          rm -f ~/lvtn-app/app.pid
        fi
        
        echo "✅ Application stopped"
        EOF
        
        chmod +x deploy/lvtn-app/stop.sh
        
        # Tạo script logs
        cat > deploy/lvtn-app/logs.sh << 'EOF'
        #!/bin/bash
        tail -f ~/lvtn-app/logs/app.log
        EOF
        
        chmod +x deploy/lvtn-app/logs.sh
        
        # Tạo README
        cat > deploy/lvtn-app/README.md << 'EOF'
        # LVTN Application Deployment
        
        ## Quick Start
        
        ```bash
        # Start application
        cd ~/lvtn-app
        bash start.sh
        
        # Stop application
        bash stop.sh
        
        # View logs
        bash logs.sh
        # or
        tail -f logs/app.log
        
        # Check if running
        ps aux | grep java
        ```
        
        ## Directory Structure
        
        ```
        ~/lvtn-app/
        ├── *.jar           # Application JAR files
        ├── current.jar     # Symlink to current version
        ├── app.pid         # Process ID file
        ├── start.sh        # Start script
        ├── stop.sh         # Stop script
        ├── logs.sh         # View logs script
        ├── logs/           # Log files
        │   └── app.log
        └── backups/        # Previous versions
            └── backup_*.jar
        ```
        
        ## Configuration
        
        Edit start.sh to change:
        - Memory: `-Xms512m -Xmx1024m`
        - Profile: `-Dspring.profiles.active=prod`
        - Port: `-Dserver.port=8080`
        EOF
        
        echo "✅ Deployment scripts created"
        ls -la deploy/lvtn-app/

    # ==========================================
    # 7. DEPLOY VIA FTP
    # ==========================================
    - name: 🚀 Deploy to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        local-dir: ./deploy/lvtn-app/
        server-dir: ./lvtn-app/
        dangerous-clean-slate: false
        log-level: verbose

    # ==========================================
    # 8. DEPLOYMENT SUCCESS
    # ==========================================
    - name: ✅ Deployment Complete
      run: |
        echo ""
        echo "=========================================="
        echo "🎉 DEPLOYMENT SUCCESSFUL!"
        echo "=========================================="
        echo ""
        echo "📦 JAR File: ${{ steps.jar-info.outputs.jar_name }}"
        echo "💾 Size: ${{ steps.jar-info.outputs.jar_size }}"
        echo "📁 Location: ~/lvtn-app/"
        echo "🕐 Time: $(date)"
        echo ""
        echo "=========================================="
        echo "🔧 NEXT STEPS - RESTART APPLICATION"
        echo "=========================================="
        echo ""
        echo "Option 1: Via cPanel Terminal"
        echo "  1. Login to cPanel"
        echo "  2. Open 'Terminal'"
        echo "  3. Run: cd ~/lvtn-app && bash start.sh"
        echo ""
        echo "Option 2: Via SSH Client (if available)"
        echo "  ssh user@${{ secrets.FTP_SERVER }}"
        echo "  cd ~/lvtn-app && bash start.sh"
        echo ""
        echo "=========================================="
        echo "📋 USEFUL COMMANDS"
        echo "=========================================="
        echo ""
        echo "Start:   bash ~/lvtn-app/start.sh"
        echo "Stop:    bash ~/lvtn-app/stop.sh"
        echo "Logs:    bash ~/lvtn-app/logs.sh"
        echo "Status:  ps aux | grep java"
        echo ""
        echo "=========================================="

    # ==========================================
    # 9. SEND NOTIFICATION (Optional)
    # ==========================================
    - name: 📧 Deployment Notification
      if: success()
      run: |
        echo "✅ New version deployed: ${{ steps.jar-info.outputs.jar_name }}"
        echo "⚠️  Remember to restart the application on cPanel!"
