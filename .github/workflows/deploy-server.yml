name: Deploy Spring Boot to Server

# Kịch bản này sẽ tự động chạy khi có code mới đẩy lên nhánh "main"
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy mã nguồn về máy chủ của GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Cài đặt môi trường Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21' # Hoặc phiên bản Java bạn đang dùng (17, 21,...)
        distribution: 'temurin'

    # 3. Build Spring Boot thành file JAR
    # (Lưu ý: Thay đổi đường dẫn cd vào thư mục backend của bạn nếu cần, ví dụ: cd server)
    - name: Build with Maven
      run: |
        cd server
        mvn clean package -DskipTests

    # 4. Đẩy file JAR lên server qua FTP/SFTP
    - name: Deploy JAR to Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Đường dẫn tới file JAR vừa build xong
        local-dir: ./server/target/
        # Chỉ đẩy file .jar, bỏ qua các file khác trong target/
        exclude: |
          **/
          !*.jar
        # Đường dẫn thư mục trên server chứa file JAR (ví dụ: /home/username/app/)
        server-dir: ./app/

    # 5. Restart ứng dụng trên server qua SSH
    - name: Restart Spring Boot App via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # Dừng process cũ nếu đang chạy
          pkill -f "your-app-name.jar" || true

          # Đợi 3 giây cho process dừng hẳn
          sleep 3

          # Chạy lại với file JAR mới (thay your-app-name bằng tên file JAR thực tế)
          nohup java -jar ~/app/your-app-name.jar \
            --spring.profiles.active=prod \
            > ~/app/app.log 2>&1 &

          echo "App restarted successfully!"
