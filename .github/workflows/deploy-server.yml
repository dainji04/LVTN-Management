name: Deploy Spring Boot to cPanel

# Tự động chạy khi push code lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy mã nguồn về
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Cài đặt Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. Build Spring Boot thành file JAR
    - name: Build with Maven
      run: |
        cd server
        mvn clean package -DskipTests

    # 4. Tạo thư mục trên cPanel server (nếu chưa có)
    - name: Create app directory on cPanel
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.CPANEL_HOST }}
        username: ${{ secrets.CPANEL_USERNAME }}
        password: ${{ secrets.CPANEL_PASSWORD }}
        port: ${{ secrets.CPANEL_SSH_PORT }}
        script: |
          mkdir -p ~/app
          mkdir -p ~/app/logs

    # 5. Upload file JAR lên cPanel qua SCP
    - name: Deploy JAR to cPanel via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.CPANEL_HOST }}
        username: ${{ secrets.CPANEL_USERNAME }}
        password: ${{ secrets.CPANEL_PASSWORD }}
        port: ${{ secrets.CPANEL_SSH_PORT }}
        source: "server/target/*.jar"
        target: "~/app/"
        strip_components: 2
        overwrite: true

    # 6. Restart ứng dụng Spring Boot trên cPanel
    - name: Restart Spring Boot Application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FPT_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # Dừng ứng dụng cũ (nếu đang chạy)
          pkill -f "group-10-0.0.1-SNAPSHOT.jar" || true
          sleep 5
          
          # Tìm file JAR mới nhất
          JAR_FILE=$(ls -t ~/app/*.jar | head -1)
          
          # Chạy ứng dụng mới
          nohup java -jar $JAR_FILE \
            --spring.profiles.active=prod \
            --server.port=8080 \
            > ~/app/logs/app.log 2>&1 &
          
          # Kiểm tra ứng dụng đã chạy chưa
          sleep 3
          if pgrep -f ".jar" > /dev/null; then
            echo "✅ Application started successfully!"
          else
            echo "❌ Application failed to start. Check logs at ~/app/logs/app.log"
            exit 1
          fi
