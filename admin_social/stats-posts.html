<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thong ke bai viet 7 ngay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Fraunces:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/stats-posts.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Thong ke bai viet 7 ngay gan nhat</h1>
          <div class="subtitle">Admin Dashboard • Bao cao bai viet</div>
        </div>
        <a class="btn-secondary" href="dashboard.html">Quay lai Dashboard</a>
      </header>

      <section class="panel">
        <div class="grid">
          <div>
            <label for="baseUrl">API Base URL</label>
            <input id="baseUrl" type="text" placeholder="http://localhost:8080" />
          </div>
          <div>
            <label for="adminToken">Admin Token</label>
            <input id="adminToken" type="password" placeholder="Bearer token" />
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary" id="btnLoad">Tai du lieu</button>
        </div>
      </section>

      <section class="panel">
        <table>
          <thead>
            <tr>
              <th>Ngay</th>
              <th>So bai viet</th>
              <th>Ghi chu</th>
            </tr>
          </thead>
          <tbody id="statsTable"></tbody>
        </table>
        <div class="empty" id="statsEmpty">Chua co du lieu.</div>
      </section>
    </div>

    <script src="js/api.js"></script>
    <script>
      const baseUrlInput = document.getElementById("baseUrl");
      const adminTokenInput = document.getElementById("adminToken");
      const statsTable = document.getElementById("statsTable");
      const statsEmpty = document.getElementById("statsEmpty");

      baseUrlInput.value = Api.getBaseUrl();
      adminTokenInput.value = Api.getToken("admin");

      function syncSettings() {
        Api.setBaseUrl(baseUrlInput.value);
        Api.setToken("admin", adminTokenInput.value);
      }

      function createCell(text) {
        const td = document.createElement("td");
        td.textContent = text === undefined || text === null ? "-" : text;
        return td;
      }

      function renderStats(items) {
        statsTable.innerHTML = "";
        if (!items || items.length === 0) {
          statsEmpty.style.display = "block";
          return;
        }
        statsEmpty.style.display = "none";
        items.forEach((item) => {
          const row = document.createElement("tr");
          row.appendChild(createCell(item.ngay || item.date));
          row.appendChild(createCell(item.soBaiViet || item.count || item.value));
          row.appendChild(createCell(item.ghiChu || item.note || ""));
          statsTable.appendChild(row);
        });
      }

      async function loadStats() {
        syncSettings();
        try {
          const response = await Api.request("/admin/dashboard/stats/posts", {
            tokenRole: "admin",
          });
          const items = Array.isArray(response) ? response : response.data || [];
          renderStats(items);
        } catch (error) {
          statsEmpty.textContent =
            "Khong tai duoc du lieu: " +
            (error.payload?.message || error.message);
          statsEmpty.style.display = "block";
        }
      }

      document.getElementById("btnLoad").addEventListener("click", loadStats);
      loadStats();
    </script>
  </body>
</html>
