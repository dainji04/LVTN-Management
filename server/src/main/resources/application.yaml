server:
  port: 8080

nodejs:
#  url: https://httpbin.org
  url: https://lvtn-management-14vw.onrender.com

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: nodejs-chat-service
            uri: ${nodejs.url}
            predicates:
              - Path=/chat/**
            filters:
              - RewritePath=/chat/(?<segment>.*), /$\{segment} # Cắt /chat, giữ lại phần đằng sau. VD: /chat/health -> /health
              # 2. Dọn rác Proxy của Gateway
              - RemoveRequestHeader=Origin
              - RemoveRequestHeader=X-Forwarded-Host
              - RemoveRequestHeader=X-Forwarded-Port
              - RemoveRequestHeader=X-Forwarded-Proto
              - RemoveRequestHeader=X-Forwarded-For
              - RemoveRequestHeader=Forwarded

              # 3. ÉP CỨNG HOST THEO CHUẨN CỦA GATEWAY
              - RemoveRequestHeader=Host
              - SetRequestHeader=Host, lvtn-management-14vw.onrender.com

  datasource:
    url: "jdbc:mysql://mysql-783bdf2-socialmedia-gr10.i.aivencloud.com:15495/SocialMedia?serverTimezone=Asia/Ho_Chi_Minh&ssl-mode=REQUIRED"
    username: avnadmin
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl #Giai quyet van de BaiViet → bai_viet
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true  #Hien thi cau lenh SQL, SQL log dễ đọc hơn

jwt:
  signerKey: ${SIGNER_JWT}
  valid-duration: 86400 #1 ngày
  refreshable-duration: 360000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

