server:
  port: 8080

nodejs:
  url: https://lvtn-management-14vw.onrender.com

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: nodejs-chat-service
            uri: ${nodejs.url}
            predicates:
              - Path=/chat/**
            filters:
              - StripPrefix=1 #hàm .replace("/chat", "")
              - RemoveRequestHeader=Host
  datasource:
    url: "jdbc:mysql://mysql-783bdf2-socialmedia-gr10.i.aivencloud.com:15495/SocialMedia?serverTimezone=Asia/Ho_Chi_Minh&ssl-mode=REQUIRED"
    username: avnadmin
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl #Giai quyet van de BaiViet → bai_viet
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true  #Hien thi cau lenh SQL, SQL log dễ đọc hơn

jwt:
  signerKey: ${SIGNER_JWT}
  valid-duration: 86400 #1 ngày
  refreshable-duration: 360000
